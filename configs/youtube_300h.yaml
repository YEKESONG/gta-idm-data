# 目标：仅从 YouTube 累计抓取并切好 ~300 小时 GTA V 素材。
# 强制要求：候选视频标题必须含 "GTA V" 或 "GTA5"（不区分大小写）。
#
# 用法：
#   # 先干跑，检查关键词 + 标题过滤后的候选质量（强烈建议先看一眼）
#   python -m scripts.run_pipeline --config configs/youtube_300h.yaml --discover-only
#   # 正式跑（可随时 Ctrl+C；重跑自动断点续跑，累计时长跨重跑累加）
#   python -m scripts.run_pipeline --config configs/youtube_300h.yaml
#
# 累计满 target_hours 小时的「有效（干净片段）时长」后自动停止，不必跑完所有候选。
work_dir: data

target_hours: 250        # 累计满 250 小时「有效（干净片段）」时长即停（非源视频时长）
keep_raw: false          # 处理完即删原始片，省磁盘（干净片段已存 clean/）

# 处理优先级：先把 B 站精选合集全部采集，再去 YouTube。同平台内保持发现顺序。
platform_priority: [bilibili, youtube]

# 过滤+导出的并行进程数。0=自动（按 CPU 核数留余量；你这台 16 核 → 约 12 进程）。
# 嫌占资源就调小（如 6）；想更快可设大（如 14）。每个片段独立处理，并行吃满多核。
num_workers: 0

discovery:
  # 只对 YouTube 做关键词搜索。B 站不开搜索（其搜索结果质量差），只用下面 seed_urls
  # 里你精选的 B 站合集 URL —— seed_urls 不受标题白名单过滤，全部保留。
  platforms: [youtube]
  queries:
    - "GTA V gameplay no commentary"
    - "GTA 5 free roam no commentary"
    - "GTA 5 shooting gameplay no commentary"
    - "GTA V combat gameplay no commentary"
    - "GTA 5 first person gameplay no commentary"
    - "GTA V free roam shooting"
    - "GTA 5 police shootout gameplay"
    - "GTA V rampage gameplay no commentary"
    - "GTA 5 walkthrough no commentary no hud"
    - "GTA V 1080p gameplay no commentary"
  max_results_per_query: 100   # 候选要足够多才凑得够 300h（搜索后段质量靠下面标题过滤兜底）
  # 标题白名单：只保留标题含这些词之一的视频（不区分大小写）。
  # 这是 OR 子串匹配，注意 "GTA 5"（带空格）与 "GTA5" 是不同子串。
  # 如需也收无空格写法（GTA5/GTAV）以扩大覆盖，把它们加回列表即可。
  require_title_keywords: ["GTA V", "GTA 5"]
  # 精选 URL（频道/播放列表/合集/单视频，yt-dlp 会展开成全部视频）。不受标题过滤。
  # 随时可往这里追加新 URL：直接重跑即可增量采集，无需 --refresh-discovery（已展开
  # 过的种子记在 discovery_cache.jsonl.seeds 里，不会重复展开，也不会重搜 YouTube）。
  seed_urls:
    # ---- B 站精选合集（platform_priority 里排在最前，会被优先采集）。共 278 集 ----
    # 多 P 视频贴「不带 ?p= 的纯 BV URL」即可展开全部分 P；已去掉 vd_source 等会话参数。
    - "https://www.bilibili.com/video/BV1indnBREvD"   # 63 集
    - "https://www.bilibili.com/video/BV1W54y1x7wc"   # 77 集
    - "https://www.bilibili.com/video/BV1BYrKBJEQZ"   # 45 集
    - "https://www.bilibili.com/video/BV1AuPhzpEN7"   # 73 集
    - "https://www.bilibili.com/video/BV1K83Vz8EJi"   # 20 集
    # 继续往下追加你的其它 B 站合集（纯 BV URL，或 collectiondetail?sid=... 合集页）：
    # - "https://www.bilibili.com/video/BVxxxxxxxxxx"
    # ---- YouTube 精选 ----
    - "https://www.youtube.com/playlist?list=PLnZ2IpETvyWx-pV2pYO4pdsG8rsCfp-Wo"
    - "https://www.youtube.com/playlist?list=PL4A_rH03rFEDF9wySQEwBMT1SFVZDEr6d"
    - "https://www.youtube.com/playlist?list=PL4A_rH03rFEC-hLR_yZ78-TefxD1SONTn"
    - "https://www.youtube.com/playlist?list=PL9MoLfABC7y5NXYXaCcWfzhHF09Pa2cxB"
    - "https://www.youtube.com/watch?v=4EQkpLKDUyU"
    # 下面两个超长录像(21h/17h)上次已完整下到 data/raw/，加进来确保重跑会切片处理
    # （yt-dlp 检测到本地已有完整文件会跳过下载，直接复用，省 38h 下载）。
    - "https://www.youtube.com/watch?v=BaxNtMFlhiw"
    - "https://www.youtube.com/watch?v=xv3wFGGeIsI"

download:
  max_height: 480
  fps: 20
  # 时长上限 3 小时：超过的（十几~二十几小时的直播/录像）在下载前按时长粗筛直接跳过。
  # 原因：单个超长视频会切出几千个片段，单线程切片 + 进程池过滤极易把整条流水线拖死
  # （曾出现挂起 2.5h 无进展），且单文件可达 10G+。设上限后流水线稳定，靠数量凑时长。
  max_duration_s: 10800   # 3h = 10800s；0 = 不限（不建议，会被超长视频拖死）
  sleep_interval_s: 5.0   # 每个视频间随机等待，降低被 YouTube 限流风险

segment:
  mode: scene
  scene_threshold: 27.0
  min_clip_seconds: 2.0
  max_clip_seconds: 30.0
  sample_fps: 2.0

filter:
  enabled_detectors: [death_screen, menu_shop, loading_black, motion]
  bad_frame_ratio_to_drop: 0.25
  min_motion_magnitude: 0.6
  static_frame_ratio_to_drop: 0.6
  classifier_ckpt: null
  classifier_threshold: 0.5
